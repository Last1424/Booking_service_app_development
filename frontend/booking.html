<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CourtBook — Book a Court</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <div id="alert"></div>

    <div class="card">
      <h2 style="margin-bottom: 4px;">Book a court</h2>
      <p class="muted" style="margin-top: 0;">Pick a sport, court, and date — then choose a 1-hour slot.</p>

      <div class="toolbar">
        <div class="form-group">
          <label for="sport">Sport</label>
          <select id="sport">
            <option value="tennis">🎾 Tennis</option>
            <option value="badminton">🏸 Badminton</option>
            <option value="pickleball">🥒 Pickleball</option>
          </select>
        </div>
        <div class="form-group">
          <label for="court">Court</label>
          <select id="court"></select>
        </div>
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" />
        </div>
      </div>

      <div id="courtInfo" class="muted" style="font-size:13px;margin-bottom: 8px;"></div>
      <div id="slots" class="slot-grid"></div>
    </div>
  </div>

  <!-- Booking modal -->
  <div id="modal" class="modal-backdrop hidden">
    <div class="modal">
      <h3>Confirm booking</h3>
      <div id="modalSummary" class="muted" style="margin-bottom: 14px;"></div>

      <h4 style="margin: 8px 0;">Optional equipment</h4>
      <div id="equipmentList"></div>

      <div style="margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); font-weight: 600;">
        Total: $<span id="totalPrice">0.00</span>
      </div>

      <div id="modalAlert"></div>
      <div class="modal-actions">
        <button class="btn" id="cancelBtn">Cancel</button>
        <button class="btn btn-primary" id="confirmBtn">Confirm booking</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/booking.js"></script>
</body>
</html>
