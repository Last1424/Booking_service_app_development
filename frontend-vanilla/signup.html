<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CourtBook — Sign up</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="navbar"></div>
  <div class="auth-wrap">
    <div class="card auth-card">
      <h2>Create account</h2>
      <div id="alert"></div>
      <form id="signupForm">
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="phone">Phone (optional)</label>
          <input type="tel" id="phone" />
        </div>
        <div class="form-group">
          <label for="password">Password (min 6 chars)</label>
          <input type="password" id="password" required minlength="6" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>
      <p class="center muted" style="margin-top:14px;font-size:13px;">
        Already have one? <a href="index.html">Sign in</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    mountNavbar("signup");
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const body = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        password: document.getElementById("password").value,
      };
      try {
        const data = await api("/auth/signup", { method: "POST", body, auth: false });
        Auth.token = data.token;
        Auth.user = data.user;
        window.location.href = "booking.html";
      } catch (err) {
        showAlert("alert", err.message);
      }
    });
  </script>
</body>
</html>
